name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CGO_ENABLED: "0"

jobs:
  package-vscode-extension:
    name: package-vscode-extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Install dependencies
        run: npm --prefix editors/vscode ci

      - name: Compile extension
        run: npm --prefix editors/vscode run compile

      - name: Package extension (.vsix)
        run: npm --prefix editors/vscode run package -- --no-yarn --allow-missing-repository

      - name: Upload VSIX artifact for GoReleaser release job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vscode-vsix
          path: editors/vscode/*.vsix
          if-no-files-found: error

  goreleaser:
    name: release
    runs-on: ubuntu-latest
    needs: package-vscode-extension
    environment: release
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: write # Required by GoReleaser and gh release upload to publish release assets.
      issues: write # Required by GoReleaser release integrations.
      pull-requests: write # Required by GoReleaser release integrations and release PR comments.
      id-token: write # Required by artifact provenance attestation.
      attestations: write # Required by actions/attest-build-provenance.
      artifact-metadata: write # Required by actions/attest-build-provenance.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: false

      - name: Install pinned tools
        run: mise install

      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vscode-vsix
          path: .release-extra

      - name: Run GoReleaser
        run: mise exec goreleaser -- goreleaser release --clean

      - name: Generate thriftls managed-install manifest
        run: |
          go run ./scripts/generate-release-manifest \
            --version "${GITHUB_REF_NAME#v}" \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --artifacts-dir dist \
            --checksums dist/checksums.txt \
            --output dist/thriftls-manifest.json

      - name: Generate VS Code release metadata
        run: |
          vsix_path="$(find .release-extra -maxdepth 1 -name '*.vsix' -print -quit)"
          go run ./scripts/generate-vscode-release-metadata \
            --vsix "$vsix_path" \
            --checksums dist/checksums.txt \
            --tool-version "${GITHUB_REF_NAME#v}" \
            --extension-version "${GITHUB_REF_NAME#v}" \
            --output dist/vscode-release-metadata.json

      - name: Prepare checksum verification roots
        run: scripts/prepare-checksum-roots.sh .checksum-roots

      - name: Verify release checksums
        run: go run ./scripts/verify-checksums --checksums dist/checksums.txt --root dist --root .checksum-roots

      - name: Generate release SBOM
        run: go run ./scripts/generate-sbom --version "${GITHUB_REF_NAME#v}" --output dist/sbom.cdx.json

      - name: Generate performance report for release notes
        run: |
          mkdir -p .tmp
          go run ./scripts/perf-report \
            --iterations 10 \
            --warmup 2 \
            --memory-iterations 200 \
            --memory-sample-every 20 \
            --json .tmp/release-perf-report.json

      - name: Compose final release notes
        run: |
          commit_sha="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          go run ./scripts/compose-release-notes \
            --repo "${GITHUB_REPOSITORY}" \
            --commit "$commit_sha" \
            --linux-note docs/linux-managed-binary-compatibility.md \
            --perf-report .tmp/release-perf-report.json \
            --output dist/release-notes.md

      - name: Generate artifact attestations (release artifacts)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            .release-extra/*.vsix
            dist/thriftls-manifest.json
            dist/vscode-release-metadata.json
            dist/sbom.cdx.json

      - name: Upload manifest + metadata to GitHub release
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/thriftls-manifest.json \
            dist/vscode-release-metadata.json \
            dist/sbom.cdx.json \
            --clobber

      - name: Update GitHub release notes
        run: gh release edit "${GITHUB_REF_NAME}" --notes-file dist/release-notes.md

      - name: Comment on released pull requests
        run: |
          prev_tag="$(git tag --sort=-version:refname | grep -vx "${GITHUB_REF_NAME}" | head -n1)"
          if [ -z "$prev_tag" ]; then
            exit 0
          fi
          go run ./scripts/notify-released-prs \
            --repo "${GITHUB_REPOSITORY}" \
            --from "$prev_tag" \
            --to "${GITHUB_REF_NAME}" \
            --release-tag "${GITHUB_REF_NAME}" \
            --release-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"

  publish-vscode-marketplace:
    name: publish-vscode-marketplace
    runs-on: ubuntu-latest
    needs:
      - package-vscode-extension
      - goreleaser
    environment: release
    steps:
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vscode-vsix
          path: .release-extra

      - name: Publish extension to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          vsix_path="$(find .release-extra -maxdepth 1 -name '*.vsix' -print -quit)"
          if [ -z "$vsix_path" ]; then
            echo "VSIX artifact not found" >&2
            exit 1
          fi
          npx --yes @vscode/vsce publish --packagePath "$vsix_path" -p "$VSCE_PAT"

  publish-open-vsx:
    name: publish-open-vsx
    runs-on: ubuntu-latest
    needs:
      - package-vscode-extension
      - goreleaser
    environment: release
    steps:
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vscode-vsix
          path: .release-extra

      - name: Publish extension to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          vsix_path="$(find .release-extra -maxdepth 1 -name '*.vsix' -print -quit)"
          if [ -z "$vsix_path" ]; then
            echo "VSIX artifact not found" >&2
            exit 1
          fi
          npx --yes ovsx publish "$vsix_path" -p "$OVSX_PAT" --skip-duplicate
