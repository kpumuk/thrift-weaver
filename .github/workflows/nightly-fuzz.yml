name: nightly-fuzz

on:
  schedule:
    # Daily short run.
    - cron: "17 3 * * *"
    # Weekly longer run.
    - cron: "29 4 * * 0"
  workflow_dispatch:
    inputs:
      profile:
        description: Fuzz profile to run
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly

permissions:
  contents: read

concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: lexer
            pkg: ./internal/lexer
            target: FuzzLex
          - id: syntax
            pkg: ./internal/syntax
            target: FuzzParse
          - id: format
            pkg: ./internal/format
            target: FuzzDocumentAndRange
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install pinned tools
        run: mise install

      - name: Resolve fuzz profile
        id: profile
        shell: bash
        run: |
          set -euo pipefail

          profile="daily"
          fuzztime="2m"
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ] && [ "${GITHUB_EVENT_SCHEDULE}" = "29 4 * * 0" ]; then
            profile="weekly"
            fuzztime="10m"
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            profile="${INPUTS_PROFILE}"
            case "$profile" in
              daily)  fuzztime="2m" ;;
              weekly) fuzztime="10m" ;;
              *)
                echo "unsupported profile: $profile" >&2
                exit 1
                ;;
            esac
          fi

          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "fuzztime=$fuzztime" >> "$GITHUB_OUTPUT"
          echo "Resolved profile=$profile fuzztime=$fuzztime"
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUTS_PROFILE: ${{ inputs.profile }}

      - name: Run fuzz target
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/fuzz-logs"
          log_path="$RUNNER_TEMP/fuzz-logs/${FUZZ_ID}.log"

          mise exec golang -- go test "${FUZZ_PKG}" \
            -run='^$' \
            -fuzz="${FUZZ_TARGET}" \
            -fuzztime="${STEPS_PROFILE_OUTPUTS_FUZZTIME}" \
            2>&1 | tee "$log_path"
        env:
          FUZZ_ID: ${{ matrix.id }}
          FUZZ_PKG: ${{ matrix.pkg }}
          FUZZ_TARGET: ${{ matrix.target }}
          STEPS_PROFILE_OUTPUTS_FUZZTIME: ${{ steps.profile.outputs.fuzztime }}

      - name: Upload fuzz crashers and logs
        if: always()
        uses: actions/upload-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v7
        with:
          name: nightly-fuzz-${{ steps.profile.outputs.profile }}-${{ matrix.id }}-${{ github.run_id }}
          path: |
            internal/**/testdata/fuzz/**
            ${{ runner.temp }}/fuzz-logs/*.log
          if-no-files-found: ignore
