name: release-pr-maintenance

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: release-pr-maintenance-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rollup-vscode-changelog:
    name: rollup-vscode-changelog
    if: >-
      startsWith(github.event.pull_request.title, 'chore: release ') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'autorelease: pending')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changelog updates to release PR branches.
      pull-requests: read # Required to inspect release PR metadata before changelog updates.
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          persist-credentials: true

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ./go.mod

      - name: Roll forward VS Code changelog
        run: |
          version="$(jq -r '.version' editors/vscode/package.json)"
          go run ./scripts/update-vscode-changelog --version "v$version" --date "$(date -u +%F)" --path editors/vscode/CHANGELOG.md

      - name: Commit changelog updates
        run: |
          if git diff --quiet -- editors/vscode/CHANGELOG.md; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add editors/vscode/CHANGELOG.md
          git commit -m "chore: roll VS Code changelog for release"
          git push
