name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: write
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  vscode-changelog-policy:
    name: vscode-changelog-policy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Check VS Code changelog policy
        run: |
          mkdir -p .tmp
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > .tmp/changed-files.txt
          go run ./scripts/check-vscode-changelog --file-list .tmp/changed-files.txt

  lint-and-test:
    name: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Run repo CI checks (Go + VS Code extension)
        run: |
          mise run ci
          git diff --exit-code

  build-smoke:
    name: build-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Build CLI binaries (smoke)
        run: go build ./cmd/...

  race-lsp:
    name: race-lsp
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Run LSP race tests
        run: mise run test-race-lsp

  package-vscode-extension-smoke:
    name: package-vscode-extension-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build VS Code extension package (smoke)
        run: |
          npm --prefix editors/vscode ci
          npm --prefix editors/vscode run compile
          npm --prefix editors/vscode run package -- --no-yarn --allow-missing-repository

      - name: Upload VSIX artifact for release smoke
        uses: actions/upload-artifact@v7
        with:
          name: vscode-vsix-smoke
          path: editors/vscode/*.vsix
          if-no-files-found: error

  vscode-extension-smoke:
    name: vscode-extension-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run VS Code extension smoke tests
        run: |
          npm --prefix editors/vscode ci
          npm --prefix editors/vscode run compile
          npm --prefix editors/vscode run test:extension-smoke

  release-artifacts-smoke:
    name: release-artifacts-smoke
    runs-on: ubuntu-latest
    needs: package-vscode-extension-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Download VSIX artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-vsix-smoke
          path: .release-extra

      - name: Run GoReleaser release path (snapshot smoke)
        run: mise exec goreleaser -- goreleaser release --snapshot --clean

      - name: Prepare checksum verification roots
        run: scripts/prepare-checksum-roots.sh .checksum-roots

      - name: Generate checksums + release metadata (smoke)
        run: |
          snapshot_version="$(sed -n 's/.*"version":"\([^"]*\)".*/\1/p' dist/metadata.json | head -n1)"
          if [ -z "$snapshot_version" ]; then
            echo "failed to read snapshot version from dist/metadata.json" >&2
            exit 1
          fi

          go run ./scripts/generate-release-manifest \
            --version "$snapshot_version" \
            --repo kpumuk/thrift-weaver \
            --tag "v$snapshot_version" \
            --artifacts-dir dist \
            --checksums dist/checksums.txt \
            --output dist/thriftls-manifest.json

          vsix_path="$(ls .release-extra/*.vsix | head -n1)"
          go run ./scripts/generate-vscode-release-metadata \
            --vsix "$vsix_path" \
            --checksums dist/checksums.txt \
            --tool-version "$snapshot_version" \
            --output dist/vscode-release-metadata.json

          test -s dist/checksums.txt
          test -s dist/thriftls-manifest.json
          test -s dist/vscode-release-metadata.json

      - name: Verify release checksums (smoke)
        run: go run ./scripts/verify-checksums --checksums dist/checksums.txt --root dist --root .checksum-roots

      - name: Generate release SBOM (smoke)
        run: |
          snapshot_version="$(sed -n 's/.*"version":"\([^"]*\)".*/\1/p' dist/metadata.json | head -n1)"
          go run ./scripts/generate-sbom --version "$snapshot_version" --output dist/sbom.cdx.json
          test -s dist/sbom.cdx.json

      - name: Upload release integrity artifacts (smoke)
        uses: actions/upload-artifact@v7
        with:
          name: release-integrity-smoke
          path: |
            dist/checksums.txt
            dist/thriftls-manifest.json
            dist/vscode-release-metadata.json
            dist/sbom.cdx.json
          if-no-files-found: error

  perf-gate:
    name: perf-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Restore previous perf state
        if: github.event_name == 'push'
        uses: actions/cache/restore@v5
        with:
          path: .tmp/perf-gate-state.env
          key: perf-gate-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            perf-gate-${{ github.ref_name }}-

      - name: Generate performance report
        run: |
          mkdir -p .tmp
          go run ./scripts/perf-report \
            --iterations 10 \
            --warmup 2 \
            --memory-iterations 200 \
            --memory-sample-every 20 \
            --json .tmp/perf-report.json

      - name: Evaluate current performance gate
        id: current-perf
        shell: bash
        run: |
          set -euo pipefail
          message_file=.tmp/perf-gate-message.txt
          if go run ./scripts/check-perf-gate --json .tmp/perf-report.json >"$message_file" 2>&1; then
            echo "current-breach=false" >>"$GITHUB_OUTPUT"
          else
            echo "current-breach=true" >>"$GITHUB_OUTPUT"
          fi
          cat "$message_file"

      - name: Read previous perf state
        id: previous-perf
        shell: bash
        run: |
          set -euo pipefail
          previous_known=false
          previous_breach=false
          if [[ -f .tmp/perf-gate-state.env ]]; then
            # shellcheck disable=SC1091
            source .tmp/perf-gate-state.env
            previous_known=true
            previous_breach="${PERF_GATE_BREACH:-false}"
          fi
          echo "previous-known=$previous_known" >>"$GITHUB_OUTPUT"
          echo "previous-breach=$previous_breach" >>"$GITHUB_OUTPUT"

      - name: Persist current perf state
        if: always()
        shell: bash
        run: |
          mkdir -p .tmp
          printf 'PERF_GATE_BREACH=%s\n' "${{ steps.current-perf.outputs.current-breach }}" > .tmp/perf-gate-state.env

      - name: Save current perf state
        if: github.event_name == 'push' && always()
        uses: actions/cache/save@v5
        with:
          path: .tmp/perf-gate-state.env
          key: perf-gate-${{ github.ref_name }}-${{ github.run_id }}

      - name: Enforce perf policy
        run: |
          go run ./scripts/evaluate-perf-policy \
            --event-name "${{ github.event_name }}" \
            --current-breach="${{ steps.current-perf.outputs.current-breach }}" \
            --previous-known="${{ steps.previous-perf.outputs.previous-known }}" \
            --previous-breach="${{ steps.previous-perf.outputs.previous-breach }}"

      - name: Upload perf gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-gate-report
          path: .tmp/perf-report.json
          if-no-files-found: error

  parser-generation-drift:
    name: parser-generation-drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Regenerate tree-sitter parser
        run: scripts/generate-tree-sitter.sh

      - name: Check generated parser drift
        run: |
          git diff --exit-code -- grammar/tree-sitter-thrift/src

  wasm-grammar-drift:
    name: wasm-grammar-drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Regenerate tree-sitter wasm grammar
        run: scripts/generate-tree-sitter-wasm.sh

      - name: Verify wasm artifact checksum
        run: scripts/verify-tree-sitter-wasm.sh

      - name: Check generated wasm grammar drift
        run: |
          git diff --exit-code -- internal/grammars/thrift/thrift.wasm internal/grammars/thrift/thrift.wasm.sha256

  thrift-oracle-compat:
    name: thrift-oracle-compat
    if: ${{ vars.THRIFT_ORACLE_VERSION_PREFIX != '' }}
    runs-on: ubuntu-22.04
    env:
      THRIFT_ORACLE_REQUIRED: "1"
      THRIFT_ORACLE_VERSION_PREFIX: ${{ vars.THRIFT_ORACLE_VERSION_PREFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install pinned tools
        run: mise install

      - name: Install thrift compiler (oracle)
        run: |
          sudo apt-get update
          sudo apt-get install -y thrift-compiler
          thrift -version

      - name: Run official thrift oracle compatibility test
        run: mise exec golang -- go test ./internal/format -run '^TestFormattedOutputParsesWithOfficialThriftOracle$' -count=1
