name: semantic-pr-title

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    permissions:
      issues: write # Required to sync title-derived issue labels on the PR.
      pull-requests: write # Required by semantic title validation and PR label sync.
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          requireScope: false
          validateSingleCommit: false
          types: |
            feat
            fix
            deps
            docs
            chore
            refactor
            test
            build
            ci
            revert

      - name: Sync title-based labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title;
            const match = title.match(/^([a-z]+)(?:\([^)]*\))?(!)?:/);
            const type = match ? match[1] : "";

            const managedLabels = ["enhancement", "bug", "documentation", "dependencies"];
            const desired = new Set();

            switch (type) {
              case "feat":
                desired.add("enhancement");
                break;
              case "fix":
                desired.add("bug");
                break;
              case "docs":
                desired.add("documentation");
                break;
              case "deps":
                desired.add("dependencies");
                break;
            }

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const current = new Set(issue.labels.map((label) => label.name));

            for (const label of managedLabels) {
              if (desired.has(label) || !current.has(label)) {
                continue;
              }
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: label,
              });
            }

            for (const label of desired) {
              if (current.has(label)) {
                continue;
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [label],
              });
            }
